name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [created]

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  MANPADS_HMAC_SECRET: ci-test-hmac-secret-not-for-production-use
  MANPADS_OPERATOR_TOKEN: ci-test-operator-token-not-for-production

jobs:
  rust-check:
    name: Rust lint, test & coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt, llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all --check

      - name: cargo clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace

      - name: cargo llvm-cov (coverage gate)
        run: |
          cargo install cargo-llvm-cov --locked
          cargo llvm-cov --workspace --fail-under-lines 40

  frontend-check:
    name: Frontend typecheck & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: pnpm/action-setup@v3
        with: { version: 10 }
      - run: pnpm -C desktop-app/frontend install --frozen-lockfile
      - run: pnpm -C desktop-app/frontend run check
      - run: pnpm -C desktop-app/frontend run test

  cross-compile-pi:
    name: Cross-compile pi-controller for Raspberry Pi (aarch64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - name: Install cross-linker
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Cross-compile
        run: |
          cargo build --package pi-controller --target aarch64-unknown-linux-gnu --release
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

  build-desktop:
    name: Build Tauri desktop app
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    needs: [rust-check, frontend-check]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: pnpm/action-setup@v3
        with: { version: 10 }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf
      - run: pnpm -C desktop-app/frontend install --frozen-lockfile
      - name: Build Tauri app
        working-directory: desktop-app/frontend
        run: pnpm tauri build
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-release
          path: desktop-app/src-tauri/target/release/bundle/

  security-audit:
    name: Rust dependency security audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
